<!-- eslint-disable @angular-eslint/template/elements-content -->
<header class="header">
  <div class="wrapper">
    <tui-textfield iconStart="@tui.search" [tuiTextfieldCleaner]="false" class="search-bar">
      <input placeholder="Search for tracks..." tuiInput [(ngModel)]="searchService.query" />
      <button tuiButtonX size="xl" (click)="searchService.query.set('')"></button>
    </tui-textfield>
    @if (viewportService.isMobile()) {
      <button
        #menuButton
        playerButton
        variant="base"
        icon="menu-kebab-vert"
        (click)="openMenu()"
      ></button>
    } @else if (authService.isAuthenticated()) {
      <button playerButton variant="secondary" class="profile-btn" size="small" (click)="logout()">
        {{ userNameInitial() }}
      </button>
    } @else {
      <button
        playerButton
        size="small"
        routerLinkActive
        routerLink="/login"
        #rla="routerLinkActive"
        [disabled]="rla.isActive"
      >
        Login
      </button>
    }
  </div>
</header>
