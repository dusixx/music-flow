<!-- eslint-disable @angular-eslint/template/elements-content -->
<div class="header">
  <div>
    @if (title()) {
      <h3 class="title">{{ title() }}</h3>
      @if (subtitle()) {
        <p class="subtitle">{{ subtitle() }}</p>
      }
    }
  </div>
  <div class="controls">
    <button
      playerButton
      icon="chevron-left"
      variant="base"
      (click)="carousel.prev()"
      [disabled]="carousel.atStart()"
    ></button>
    <button
      playerButton
      icon="chevron-right"
      variant="base"
      (click)="carousel.next()"
      [disabled]="carousel.atEnd()"
    ></button>
  </div>
</div>
<player-carousel #carousel class="carousel">
  <ng-content />
</player-carousel>
