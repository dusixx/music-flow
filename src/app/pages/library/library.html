<section class="library-section">
  <h2 class="section-title">Playlists</h2>
  <div class="playlists-grid">
    <div
      class="create-playlist-card"
      (click)="openCreateForm()"
      tabindex="0"
      (keydown.enter)="openCreateForm()"
    >
      <div class="icon-wrapper">
        <player-sprite icon="music-plus" class="library-create-icon" />
      </div>
      <div class="card-info">
        <span class="title">Create Playlist</span>
        <span class="subtitle">Click to add new</span>
      </div>
    </div>

    @for (playlist of playlistsResource.value(); track playlist.id) {
      <div class="create-playlist-card" tabindex="0" [routerLink]="['/playlists', playlist.id]">
        <div class="icon-wrapper">
          <player-sprite icon="music" class="library-create-icon" />
        </div>
        <div class="card-info">
          <span class="title" [title]="playlist.name">{{ playlist.name }}</span>
          <span class="subtitle">{{ playlist.trackIds?.length ?? 0 }} tracks</span>
        </div>
      </div>
    }
  </div>
</section>
<section class="library-section">
  <h2 class="section-title">Recently Played</h2>
  <div class="history-list">
    <p class="empty-state">Your listening history will appear here.</p>
  </div>
</section>
<player-dialog [isOpen]="isModalOpen()" (closeDialog)="closeCreateForm()">
  <player-playlist-form #playlistFormRef (closeForm)="closeCreateForm()" />
</player-dialog>
