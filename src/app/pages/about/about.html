<section class="about">
  <h1 class="about-title">About Us</h1>
  <div class="about-cards">
    @for (member of teamMembers; track member.name) {
      <player-team-member-card
        [photo]="member.photo"
        [name]="member.name"
        [role]="member.role"
        [bio]="member.bio"
        [github]="member.github"
        [favtracks]="member.favtracks"
      />
    }
  </div>
</section>
<section class="rss">
  <a href="https://rs.school" target="_blank" rel="noopener noreferrer">
    <img src="assets/logos/rss-logo.svg" alt="RS School" class="rss-logo" />
  </a>
</section>
