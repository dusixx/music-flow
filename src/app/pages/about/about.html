<section class="about">
  <h1>About Us</h1>
  <div class="about-cards">
    @for (member of teamMembers; track member.name) {
      <player-team-member-card
        [photo]="member.photo"
        [name]="member.name"
        [role]="member.role"
        [bio]="member.bio"
        [github]="member.github"
        [favtracks]="member.favtracks"
      />
    }
  </div>
</section>
